<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San José Street Tree Project</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      /* Oak woodland fall palette */
      --bg: #f4efe6;              /* dry grass / duff */
      --card: #fbf8f2;            /* light parchment */
      --ink: #2f3a2f;             /* deep olive */
      --muted: #6e7465;           /* sage-gray */
      --line: #d6d2c4;

      --accent: #7a5a2b;          /* oak bark */
      --accent-dark: #4e3a1e;

      --soft: #ece6d8;            /* faded straw */
      --warn: #f3ead2;

      --shadow: 0 8px 24px rgba(60, 50, 30, 0.08);
      --radius: 18px;
      --max: 980px;

      /* Map colors (muted, natural) */
      --visited: #6f7f5f;         /* dusty olive green */
      --inprogress: #c2a35a;      /* dry gold */
      --notvisited: #cfc9bb;      /* pale soil */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 24px 18px 64px;
    }

    /* Keep green, but slightly naturalized */
    header {
      background: linear-gradient(135deg, #e6efe6 0%, #d8e4d6 70%, #ece6d8 100%);
      border-bottom: 1px solid var(--line);
    }

    .hero {
      padding: 34px 18px 28px;
      max-width: var(--max);
      margin: 0 auto;
    }

    .kicker {
      display: inline-block;
      padding: 6px 10px;
      background: rgba(255,255,255,0.65);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.88rem;
      color: #3e4a3e;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.1;
      color: #2f3a2f;
    }

    .subtitle {
      max-width: 760px;
      font-size: 1.05rem;
      color: #5f6b5f;
      margin: 0;
    }

    .notice {
      margin-top: 18px;
      background: var(--warn);
      border: 1px solid #d9cfaa;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.98rem;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .stats {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent-dark);
    }

    .stat-label {
      font-weight: 700;
      margin-bottom: 5px;
    }

    .stat-note,
    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    main {
      margin-top: 24px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 18px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #4a4f3d;
    }

    h3 {
      margin: 18px 0 8px;
      font-size: 1rem;
      color: #5a4a2e;
    }

    ul {
      margin: 10px 0 0 18px;
      padding: 0;
    }

    li + li { margin-top: 6px; }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid #d8d0bb;
      font-size: 0.94rem;
      color: #4e4a3a;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .button:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .button.secondary {
      background: var(--card);
      color: var(--accent-dark);
    }

    .button.secondary:hover {
      background: var(--soft);
    }

    .faq {
      margin-top: 18px;
    }

    details {
      border-top: 1px solid var(--line);
      padding: 12px 0;
    }

    details:last-child {
      border-bottom: 1px solid var(--line);
    }

    summary {
      cursor: pointer;
      font-weight: 700;
      color: #4a4f3d;
    }

    .map-wrap {
      margin-top: 18px;
    }

    #map {
      width: 100%;
      height: 520px;
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.15);
      display: inline-block;
    }

    .swatch.visited { background: var(--visited); }
    .swatch.inprogress { background: var(--inprogress); }
    .swatch.notvisited { background: var(--notvisited); }

    footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      #map {
        height: 420px;
      }
    }
  </style>
</head>
<body>

  <!-- content unchanged -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map', {
      scrollWheelZoom: false
    }).setView([37.3387, -121.8853], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getStatusColor(status) {
      switch (status) {
        case 'visited':
          return '#6f7f5f';
        case 'in_progress':
          return '#c2a35a';
        default:
          return '#cfc9bb';
      }
    }

    function styleFeature(feature) {
      return {
        fillColor: getStatusColor(feature.properties.status),
        weight: 1.5,
        opacity: 1,
        color: '#6e7465',
        fillOpacity: 0.65
      };
    }

    fetch('neighborhood_status.geojson')
      .then(response => response.json())
      .then(data => {
        const geojsonLayer = L.geoJSON(data, {
          style: styleFeature
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
      });
  </script>

</body>
</html>
